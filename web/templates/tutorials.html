{% extends "base.html" %}
{% block content %}

<div style="max-width:1000px; margin:auto; padding:60px;">

    <h1>Python Tutorials</h1>

    {% for tutorial in tutorials %}
    <div class="problem-card">
        <h3>{{ tutorial.title }}</h3>
        <a href="/tutorials/{{ tutorial.slug }}" class="btn-main btn-primary">
            Learn
        </a>
    </div>
    {% endfor %}

</div>

{% endblock %}
